name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
  packages: write
jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: cywave-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            name: cywave-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-13
            name: cywave-darwin-amd64
            sign: true
          - target: aarch64-apple-darwin
            os: macos-14
            name: cywave-darwin-arm64
            sign: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: cywave-windows-amd64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Sign macOS binary
        if: matrix.sign
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -n "$APPLE_CERTIFICATE_BASE64" ]; then
            CERT_PATH=$RUNNER_TEMP/cert.p12
            KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
            KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
            echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode -o $CERT_PATH
            security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
            security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
            security import $CERT_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
            security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
            security list-keychain -d user -s $KEYCHAIN_PATH
            codesign --force --sign "$APPLE_SIGNING_IDENTITY" --timestamp --options runtime target/${{ matrix.target }}/release/cywave
          fi
      - name: Notarize
        if: matrix.sign
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$APPLE_ID" ]; then
            ditto -c -k --keepParent target/${{ matrix.target }}/release/cywave /tmp/cywave.zip
            xcrun notarytool submit /tmp/cywave.zip --apple-id "$APPLE_ID" --password "$APPLE_APP_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait || true
          fi
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/cywave dist/${{ matrix.name }}
          chmod +x dist/${{ matrix.name }}
      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/cywave.exe dist/${{ matrix.name }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Checksums
        run: cd artifacts && for dir in */; do (cd "$dir" && sha256sum * >> ../checksums.txt); done
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/cywave-linux-amd64/cywave-linux-amd64
            artifacts/cywave-linux-arm64/cywave-linux-arm64
            artifacts/cywave-darwin-amd64/cywave-darwin-amd64
            artifacts/cywave-darwin-arm64/cywave-darwin-arm64
            artifacts/cywave-windows-amd64.exe/cywave-windows-amd64.exe
            artifacts/checksums.txt
